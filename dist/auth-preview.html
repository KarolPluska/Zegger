<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Zegger ERP - Auth Preview</title>
<style>
:root {
  --zerp-bg: #f4f5f7;
  --zerp-surface: #ffffff;
  --zerp-surface-2: #f8f9fb;
  --zerp-text: #1f2530;
  --zerp-muted: #6b7280;
  --zerp-border: #dce1e8;
  --zerp-primary: #111827;
  --zerp-primary-inverse: #ffffff;
  --zerp-danger: #b42318;
  --zerp-warning: #f59e0b;
  --zerp-radius: 14px;
  --zerp-shadow: 0 8px 24px rgba(17, 24, 39, 0.08);
  --zerp-auth-bg-url: none;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  background: var(--zerp-bg);
  color: var(--zerp-text);
  font-family: Poppins, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  overflow-x: hidden;
}

.zerp-app {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

.zerp-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 16px;
  background: var(--zerp-surface);
  border-bottom: 1px solid var(--zerp-border);
  position: sticky;
  top: 0;
  z-index: 40;
}

.zerp-brand-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.zerp-brand-mark {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--zerp-primary);
  color: var(--zerp-primary-inverse);
  display: grid;
  place-items: center;
  font-weight: 700;
}

.zerp-brand-name {
  font-size: 14px;
  font-weight: 700;
  line-height: 1.1;
}

.zerp-brand-sub {
  font-size: 12px;
  color: var(--zerp-muted);
}

.zerp-topbar-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.zerp-icon-btn,
.zerp-user-btn,
.zerp-btn,
.zerp-input,
.zerp-select,
textarea {
  font: inherit;
}

.zerp-icon-btn,
.zerp-user-btn,
.zerp-btn {
  border: 1px solid var(--zerp-border);
  background: var(--zerp-surface);
  color: var(--zerp-text);
  border-radius: 10px;
  padding: 8px 12px;
  cursor: pointer;
}

.zerp-icon-btn:hover,
.zerp-user-btn:hover,
.zerp-btn:hover {
  background: var(--zerp-surface-2);
}

.zerp-btn-primary {
  background: var(--zerp-primary);
  color: var(--zerp-primary-inverse);
  border-color: var(--zerp-primary);
}

.zerp-btn-danger {
  border-color: #f2b8b5;
  color: var(--zerp-danger);
}

.zerp-badge {
  display: inline-grid;
  place-items: center;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  font-size: 11px;
  font-weight: 700;
  border-radius: 999px;
  background: var(--zerp-primary);
  color: var(--zerp-primary-inverse);
  margin-left: 4px;
}

.zerp-main {
  display: grid;
  grid-template-columns: 1fr;
  min-height: calc(100dvh - 62px);
}

.zerp-sidebar {
  border-bottom: 1px solid var(--zerp-border);
  background: var(--zerp-surface);
  padding: 10px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
}

.zerp-sidebar-item {
  border: 1px solid var(--zerp-border);
  background: var(--zerp-surface);
  border-radius: 10px;
  padding: 8px 12px;
  white-space: nowrap;
  cursor: pointer;
}

.zerp-sidebar-item.is-active {
  background: var(--zerp-primary);
  color: var(--zerp-primary-inverse);
  border-color: var(--zerp-primary);
}

.zerp-sidebar-item.is-disabled {
  opacity: 0.55;
  cursor: not-allowed;
}

.zerp-content {
  padding: 14px;
}

.zerp-card {
  background: var(--zerp-surface);
  border: 1px solid var(--zerp-border);
  border-radius: var(--zerp-radius);
  box-shadow: var(--zerp-shadow);
  padding: 14px;
}

.zerp-auth-view {
  max-width: 560px;
  margin: 20px auto;
}

.zerp-auth-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.zerp-auth-tabs button {
  flex: 1;
}

.zerp-form-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

.zerp-field label {
  display: block;
  font-size: 12px;
  color: var(--zerp-muted);
  margin-bottom: 4px;
}

.zerp-input,
.zerp-select,
textarea {
  width: 100%;
  border: 1px solid var(--zerp-border);
  border-radius: 10px;
  background: var(--zerp-surface);
  padding: 9px 10px;
  color: var(--zerp-text);
}

textarea {
  min-height: 90px;
  resize: vertical;
}

.zerp-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}

.zerp-error,
.zerp-info {
  border-radius: 10px;
  padding: 10px;
  font-size: 13px;
}

.zerp-error {
  color: #8d1d18;
  background: #fde8e8;
  border: 1px solid #f8c9c7;
}

.zerp-info {
  color: #1d4f91;
  background: #edf5ff;
  border: 1px solid #cbe0ff;
}

.zerp-dashboard-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

.zerp-tile {
  border: 1px solid var(--zerp-border);
  border-radius: 12px;
  padding: 12px;
  background: var(--zerp-surface);
  cursor: pointer;
}

.zerp-tile:hover {
  background: var(--zerp-surface-2);
}

.zerp-tile.is-disabled {
  opacity: 0.55;
  cursor: not-allowed;
}

.zerp-tile-title {
  font-weight: 600;
  margin-bottom: 4px;
}

.zerp-muted {
  color: var(--zerp-muted);
  font-size: 12px;
}

.zerp-summary-strip {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin-bottom: 12px;
}

.zerp-summary-item {
  border: 1px solid var(--zerp-border);
  border-radius: 10px;
  padding: 10px;
  background: var(--zerp-surface);
}

.zerp-summary-value {
  font-size: 20px;
  font-weight: 700;
}

.zerp-module-view iframe {
  width: 100%;
  min-height: 76dvh;
  border: 1px solid var(--zerp-border);
  border-radius: var(--zerp-radius);
  background: #fff;
}

.zerp-list {
  display: grid;
  gap: 8px;
}

.zerp-list-item {
  border: 1px solid var(--zerp-border);
  border-radius: 10px;
  padding: 10px;
  background: var(--zerp-surface);
}

.zerp-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  flex-wrap: wrap;
}

.zerp-impersonation-banner {
  background: #fff7e0;
  color: #7a4a00;
  border-bottom: 1px solid #f4d48f;
  padding: 8px 14px;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.zerp-modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.45);
  z-index: 90;
  display: grid;
  place-items: center;
  padding: 12px;
}

.zerp-modal {
  width: min(520px, 100%);
  background: var(--zerp-surface);
  border: 1px solid var(--zerp-border);
  border-radius: 14px;
  box-shadow: var(--zerp-shadow);
  padding: 14px;
}

@media (min-width: 940px) {
  .zerp-main {
    grid-template-columns: 240px minmax(0, 1fr);
  }

  .zerp-sidebar {
    border-bottom: 0;
    border-right: 1px solid var(--zerp-border);
    flex-direction: column;
    overflow: auto;
  }

  .zerp-dashboard-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .zerp-form-grid.cols-2 {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (min-width: 1200px) {
  .zerp-dashboard-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}

.zerp-grid-two {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.zerp-chat-wrap {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.zerp-chat-panel {
  min-height: 280px;
}

.zerp-chat-list {
  margin-top: 10px;
  max-height: 62dvh;
  overflow: auto;
}

.zerp-chat-thread-btn {
  width: 100%;
  text-align: left;
  cursor: pointer;
  background: var(--zerp-surface);
}

.zerp-chat-thread-btn.is-active {
  border-color: var(--zerp-primary);
  box-shadow: 0 0 0 2px rgba(17, 24, 39, 0.08) inset;
}

.zerp-chat-messages {
  max-height: 46dvh;
  overflow: auto;
}

.zerp-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  border: 1px solid var(--zerp-border);
  border-radius: 999px;
  padding: 4px 10px;
  margin: 0 6px 6px 0;
  background: var(--zerp-surface-2);
  font-size: 12px;
}

.zerp-link {
  color: #0b63ce;
  text-decoration: none;
}

.zerp-link:hover {
  text-decoration: underline;
}

.zerp-list-item.is-system {
  background: #f8fafc;
  border-style: dashed;
}

@media (min-width: 980px) {
  .zerp-grid-two {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .zerp-chat-wrap {
    grid-template-columns: minmax(280px, 380px) minmax(0, 1fr);
  }
}

.zerp-offers-inline-host{min-height:70dvh;overflow:auto;}
/* Auth Premium Prelogin */
body.zerp-prelogin {
  background: #edf0f4;
}

body.zerp-prelogin .zerp-topbar,
body.zerp-prelogin .zerp-sidebar,
body.zerp-prelogin .zerp-module-view,
body.zerp-prelogin .zerp-impersonation-banner {
  display: none !important;
}

body.zerp-prelogin .zerp-main {
  display: block;
  min-height: 100dvh;
}

body.zerp-prelogin .zerp-content {
  padding: 0;
  min-height: 100dvh;
}

body.zerp-prelogin .zerp-auth-view {
  max-width: none;
  margin: 0;
  min-height: 100dvh;
  display: grid;
  place-items: center;
  padding: 0;
}

.zerp-auth-scene {
  position: relative;
  width: 100%;
  min-height: 100dvh;
  overflow: hidden;
  display: grid;
  place-items: center;
  isolation: isolate;
}

.zerp-auth-backdrop,
.zerp-auth-overlay {
  position: absolute;
  inset: 0;
}

.zerp-auth-backdrop {
  background-image:
    radial-gradient(circle at 18% 20%, rgba(255, 255, 255, 0.5), transparent 54%),
    radial-gradient(circle at 82% 22%, rgba(255, 255, 255, 0.44), transparent 58%),
    linear-gradient(135deg, rgba(255, 255, 255, 0.26), rgba(255, 255, 255, 0.06)),
    var(--zerp-auth-bg-url);
  background-size: cover, cover, cover, cover;
  background-position: center;
  transform: scale(1.02);
  filter: blur(2px) saturate(0.9) contrast(0.94) brightness(1.04);
}

.zerp-auth-overlay {
  background: linear-gradient(165deg, rgba(249, 251, 253, 0.66), rgba(243, 246, 250, 0.82));
  backdrop-filter: blur(18px);
}

.zerp-auth-card {
  position: relative;
  z-index: 2;
  width: min(560px, calc(100% - 22px));
  border-radius: 26px;
  background: rgba(255, 255, 255, 0.93);
  border: 1px solid rgba(255, 255, 255, 0.72);
  box-shadow: 0 38px 90px rgba(15, 23, 42, 0.22), 0 8px 20px rgba(15, 23, 42, 0.1);
  padding: clamp(22px, 3.4vw, 34px);
}

.zerp-auth-head {
  display: grid;
  justify-items: center;
  text-align: center;
  gap: 8px;
  margin-bottom: 20px;
}

.zerp-auth-brand-mark {
  width: 58px;
  height: 58px;
  border-radius: 18px;
  background: #fff;
  border: 1px solid rgba(15, 23, 42, 0.12);
  overflow: hidden;
  display: grid;
  place-items: center;
  box-shadow: 0 14px 34px rgba(15, 23, 42, 0.18);
}

.zerp-auth-brand-mark img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.zerp-auth-kicker {
  margin: 0;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #64748b;
}

.zerp-auth-head h1 {
  margin: 0;
  font-size: clamp(26px, 3vw, 31px);
  line-height: 1.16;
  letter-spacing: -0.02em;
  font-weight: 700;
  color: #121923;
}

.zerp-auth-lead {
  margin: 0;
  max-width: 44ch;
  font-size: 13px;
  line-height: 1.55;
  color: #4b5563;
}

.zerp-auth-segment {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 4px;
  border-radius: 14px;
  border: 1px solid #dbe2ea;
  background: #eef2f6;
  padding: 4px;
  margin-bottom: 14px;
}

.zerp-auth-segment-btn {
  border: 0;
  border-radius: 10px;
  min-height: 40px;
  padding: 0 10px;
  background: transparent;
  color: #495565;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: background-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
}

.zerp-auth-segment-btn:hover {
  background: rgba(255, 255, 255, 0.74);
}

.zerp-auth-segment-btn.is-active {
  background: #101827;
  color: #f8fafc;
  box-shadow: 0 8px 20px rgba(17, 24, 39, 0.24);
}

.zerp-auth-segment-btn:focus-visible,
.zerp-input:focus-visible,
.zerp-select:focus-visible,
textarea:focus-visible,
.zerp-btn:focus-visible,
.zerp-input-toggle:focus-visible {
  outline: none;
  box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.18);
}

.zerp-auth-feedback {
  margin-bottom: 10px;
}

.zerp-auth-feedback:empty {
  display: none;
}

.zerp-auth-form-complex {
  row-gap: 12px;
}

.zerp-auth-progress {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}

.zerp-auth-step {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 34px;
  border-radius: 999px;
  border: 1px solid #d8e0e8;
  background: #f4f7fa;
  color: #516174;
  font-size: 12px;
  font-weight: 600;
}

.zerp-auth-step.is-active {
  border-color: #101827;
  background: #101827;
  color: #f8fafc;
}

.zerp-auth-section-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: #64748b;
  margin-top: 4px;
}

.zerp-auth-help {
  margin: 0;
  font-size: 12px;
  line-height: 1.6;
  color: #5f6b7b;
}

.zerp-field label {
  display: block;
  margin-bottom: 6px;
  font-size: 12px;
  font-weight: 600;
  color: #425066;
}

.zerp-input,
.zerp-select,
textarea {
  width: 100%;
  min-height: 46px;
  border: 1px solid #d7dee7;
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.96);
  padding: 0 14px;
  color: #111827;
  transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
}

.zerp-input::placeholder,
textarea::placeholder {
  color: #9aa5b1;
}

.zerp-input:focus,
.zerp-select:focus,
textarea:focus {
  border-color: #6b7280;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(107, 114, 128, 0.18);
  outline: none;
}

textarea {
  min-height: 96px;
  resize: vertical;
  padding-top: 10px;
  padding-bottom: 10px;
}

.zerp-input-wrap {
  position: relative;
}

.zerp-input-wrap .zerp-input {
  padding-right: 48px;
}

.zerp-input-toggle {
  position: absolute;
  top: 50%;
  right: 8px;
  transform: translateY(-50%);
  width: 34px;
  height: 34px;
  border-radius: 10px;
  border: 1px solid transparent;
  background: transparent;
  color: #5f6b7b;
  font-size: 14px;
  cursor: pointer;
}

.zerp-input-toggle:hover,
.zerp-input-toggle.is-active {
  background: #f2f5f8;
  border-color: #dbe2ea;
  color: #111827;
}

.zerp-actions {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 9px;
  margin-top: 8px;
}

.zerp-actions .zerp-btn {
  min-height: 46px;
  padding: 0 18px;
  border-radius: 14px;
  font-weight: 600;
  border-color: #d5dce5;
  background: rgba(255, 255, 255, 0.9);
}

.zerp-actions .zerp-btn-primary {
  border-color: #111827;
  background: #111827;
  color: #f8fafc;
}

.zerp-actions .zerp-btn-primary:hover {
  background: #1f2937;
  border-color: #1f2937;
}

.zerp-actions .zerp-btn:disabled {
  opacity: 0.62;
  cursor: not-allowed;
}

.zerp-error,
.zerp-info {
  border-radius: 12px;
  padding: 11px 12px;
  font-size: 13px;
  line-height: 1.45;
  border: 1px solid transparent;
}

.zerp-error {
  color: #8f2320;
  background: rgba(254, 241, 241, 0.96);
  border-color: #f3d4d4;
}

.zerp-info {
  color: #1f3d63;
  background: rgba(238, 246, 255, 0.96);
  border-color: #d2e3f7;
}

@media (max-width: 940px) {
  .zerp-auth-scene {
    min-height: 100dvh;
  }

  .zerp-auth-card {
    width: min(560px, calc(100% - 20px));
    border-radius: 20px;
    padding: 20px;
  }
}

@media (max-width: 720px) {
  body.zerp-prelogin .zerp-auth-view {
    padding: 0;
  }

  .zerp-auth-card {
    width: min(560px, calc(100% - 16px));
    border-radius: 18px;
    padding: 16px;
  }

  .zerp-auth-head h1 {
    font-size: 24px;
  }

  .zerp-auth-segment {
    gap: 3px;
    padding: 3px;
  }

  .zerp-auth-segment-btn {
    min-height: 38px;
    font-size: 12px;
    padding: 0 8px;
  }

  .zerp-actions .zerp-btn {
    width: 100%;
  }
}
</style>
</head>
<body class="zerp-app-body zerp-prelogin" style="--zerp-auth-bg-url:url('https://zegger.pl/wp-content/uploads/2025/05/Logo-black-negative-scaled.jpg')">
  <div id="zerp-app" class="zerp-app zerp-prelogin">
    <main class="zerp-main">
      <section class="zerp-content">
        <div id="zerp-auth-view" class="zerp-auth-view">
          <div class="zerp-auth-scene">
            <div class="zerp-auth-backdrop"></div>
            <div class="zerp-auth-overlay"></div>
            <section class="zerp-auth-card" aria-label="Ekran logowania Zegger ERP">
              <header class="zerp-auth-head">
                <div class="zerp-auth-brand-mark"><img src="https://zegger.pl/wp-content/uploads/2025/05/Logo-black-negative-scaled.jpg" alt="Zegger"></div>
                <p class="zerp-auth-kicker">Strefa dostępu</p>
                <h1>Logowanie do Zegger ERP</h1>
                <p class="zerp-auth-lead">Nowoczesne środowisko ofert, relacji i komunikacji w jednym miejscu.</p>
              </header>
              <div class="zerp-auth-segment" role="tablist" aria-label="Sekcje konta">
                <button class="zerp-auth-segment-btn is-active" type="button">Logowanie</button>
                <button class="zerp-auth-segment-btn" type="button">Nowa firma</button>
                <button class="zerp-auth-segment-btn" type="button">Dołącz do firmy</button>
              </div>
              <div class="zerp-auth-feedback" aria-live="polite"></div>
              <div id="zerp-auth-body">
                <form class="zerp-form-grid">
                  <div class="zerp-field">
                    <label>Login lub e-mail</label>
                    <input class="zerp-input" value="" placeholder="twoj@email.pl">
                  </div>
                  <div class="zerp-field">
                    <label>Hasło</label>
                    <div class="zerp-input-wrap">
                      <input class="zerp-input" type="password" value="">
                      <button class="zerp-input-toggle" type="button" aria-label="Pokaż hasło">&#128065;</button>
                    </div>
                  </div>
                  <div class="zerp-actions">
                    <button class="zerp-btn zerp-btn-primary" type="button">Zaloguj</button>
                  </div>
                </form>
              </div>
            </section>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
